<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main circle background -->
  <circle cx="30" cy="30" r="25" fill="url(#logoGradient)" />

  <!-- Tech icon - stylized T -->
  <path d="M20 18 L40 18 L40 22 L32 22 L32 42 L28 42 L28 22 L20 22 Z" fill="white" />

  <!-- Circuit pattern -->
  <circle cx="22" cy="35" r="1.5" fill="white" opacity="0.7" />
  <circle cx="38" cy="25" r="1.5" fill="white" opacity="0.7" />
  <line x1="23.5" y1="35" x2="36.5" y2="25" stroke="white" stroke-width="0.5" opacity="0.6" />

  <!-- Company name -->
  <text x="55" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0f766e">Trust-IT</text>
  <text x="55" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="600" fill="#64748b">(BD) Ltd</text>

  <!-- Decorative elements -->
  <rect x="55" y="28" width="20" height="1" fill="#14b8a6" opacity="0.5" />
</svg>