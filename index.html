<!DOCTYPE html>
<html lang="en">
<head>

    <meta property="og:description" content="Your trusted partner in web development, mobile applications, and IT consulting.">
    <meta property="og:image" content="https://trust-it-task.vercel.app/assets/logo.svg">

    <meta property="og:site_name" content="Trust-IT (BD) Ltd">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Trust-IT (BD) Ltd - Innovative IT Solutions">
    <meta name="twitter:description" content="Your trusted partner in web development, mobile applications, and IT consulting.">
    <meta name="twitter:image" content="https://trust-it-task.vercel.app/assets/logo.svg">

    <link rel="canonical" href="https://trust-it-task.vercel.app">
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <title>Trust-IT (BD) Ltd - Innovative IT Solutions in Bangladesh</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-teal-600 text-white px-4 py-2 rounded z-50">Skip to main content</a>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS Files -->
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/interactions.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        /* Critical CSS for initial render - minimal styles only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .sr-only.focus:not-sr-only {
            position: static;
            width: auto;
            height: auto;
            padding: inherit;
            margin: inherit;
            overflow: visible;
            clip: auto;
            white-space: normal;
        }
    </style>
</head>
<body class="font-sans transition-colors duration-300">
    <!-- Navigation -->
    <nav class="animated-nav fixed top-0 left-0 right-0 z-50" role="navigation" aria-label="Main navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <!-- Logo -->
                <div class="flex-shrink-0">
                    <a href="#hero" aria-label="Trust-IT (BD) Ltd - Go to home section">
                        <img src="assets/logo.svg" alt="Trust-IT (BD) Ltd Logo" class="h-8 w-auto sm:h-10 md:h-12" loading="lazy">
                    </a>
                </div>

                <!-- Desktop Navigation -->
                <div class="hidden md:block">
                    <ul class="ml-10 flex items-baseline space-x-4" role="menubar">
                        <li role="none">
                            <a href="#hero" class="nav-link px-3 py-2 text-sm font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to home section">
                                Home
                            </a>
                        </li>
                        <li role="none">
                            <a href="#services" class="nav-link px-3 py-2 text-sm font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to services section">
                                Services
                            </a>
                        </li>
                        <li role="none">
                            <a href="#about" class="nav-link px-3 py-2 text-sm font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to about section">
                                About
                            </a>
                        </li>
                        <li role="none">
                            <a href="#contact" class="nav-link px-3 py-2 text-sm font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to contact section">
                                Contact
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Dark Mode & Mobile Menu -->
                <div class="flex items-center space-x-4">
                    <button id="darkModeToggle"
                            class="p-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 hover:bg-gray-300 dark:hover:bg-gray-600 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2"
                            aria-label="Toggle between light and dark theme"
                            type="button">
                        <i class="fas fa-moon" aria-hidden="true"></i>
                    </button>

                    <!-- Mobile menu button -->
                    <div class="md:hidden">
                        <button id="mobile-menu-button"
                                class="p-2 rounded-md text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-teal-500"
                                aria-label="Toggle mobile navigation menu"
                                aria-expanded="false"
                                type="button">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile Navigation Menu -->
        <div id="mobile-menu" class="md:hidden hidden bg-white dark:bg-gray-800 shadow-lg border-t border-gray-200 dark:border-gray-700" role="menu" aria-label="Mobile navigation menu">
            <ul class="px-2 pt-2 pb-3 space-y-1 sm:px-3" role="menubar">
                <li role="none">
                    <a href="#hero" class="mobile-nav-link block px-3 py-2 text-base font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to home section">
                        Home
                    </a>
                </li>
                <li role="none">
                    <a href="#services" class="mobile-nav-link block px-3 py-2 text-base font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to services section">
                        Services
                    </a>
                </li>
                <li role="none">
                    <a href="#about" class="mobile-nav-link block px-3 py-2 text-base font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to about section">
                        About
                    </a>
                </li>
                <li role="none">
                    <a href="#contact" class="mobile-nav-link block px-3 py-2 text-base font-medium text-gray-900 dark:text-white hover:text-teal-600 dark:hover:text-teal-400 transition-colors duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2 rounded" role="menuitem" aria-label="Navigate to contact section">
                        Contact
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Scroll Progress Bar -->
    <div class="fixed top-0 left-0 w-full h-1 bg-gray-200 dark:bg-gray-700 z-50">
        <div id="scrollProgress" class="h-full bg-gradient-to-r from-teal-500 to-cyan-500 transition-transform duration-300"></div>
    </div>

    <main id="main-content" role="main">
        <div id="hero-container" class="component-loading"></div>
        <div id="services-container" class="component-loading"></div>
        <div id="about-container" class="component-loading"></div>
        <div id="contact-container" class="component-loading"></div>
    </main>

    <div id="footer-container" class="component-loading"></div>


    <!-- AOS Library for scroll animations -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!-- Modular JavaScript -->
    <script src="js/theme-manager.js"></script>
    <script src="js/navigation-manager.js"></script>
    <script src="js/scroll-manager.js"></script>
    <script src="js/component-loader.js"></script>
    <script src="js/performance.js"></script>
    <script src="js/script.js"></script>

    <!-- Initialize AOS -->
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            offset: 50
        });
    </script>
</body>
</html>
